# RiskEngine: все числа — из бизнес/риск-профиль.md.
# При изменении правила: сначала правим риск-профиль, потом сюда.
# Никогда — наоборот.

# Риск на сделку, % эквити, по tier'у сетапа.
risk_pct:
  B: 1.0       # стандартный сетап (большинство сделок)
  A: 1.5       # подтверждённый сетап
  A_PLUS: 2.0  # премиум, максимум на сделку

# Жёсткие лимиты.
limits:
  max_effective_leverage: 5      # абсолютный потолок (риск-профиль.md)
  stop_min_pct: 0.5              # стоп тоньше = шум, риск-профиль.md
  liquidation_buffer_ratio: 0.3  # (stop - liq) >= 30% от расстояния стопа

# Circuit breakers: при срабатывании RiskEngine отказывает в ордере.
# Сброс state — на стороне orchestrator (по UTC-дню/неделе/месяцу).
circuit_breakers:
  daily_loss_pct: -3.0       # -3% эквити за день → стоп до завтра
  weekly_loss_pct: -7.0      # -7% эквити за неделю → стоп до понедельника
  monthly_loss_pct: -15.0    # -15% эквити за месяц → ручной перезапуск
  max_daily_trades: 3        # после 3 сделок (любых) — стоп до завтра
  max_consecutive_losses: 3  # 3 убытка подряд = стоп до завтра
