# RiskEngine: все числа — из бизнес/риск-профиль.md.
# При изменении правила: сначала правим риск-профиль, потом сюда.
# Никогда — наоборот.

# Риск на сделку, % эквити, по tier'у сетапа.
risk_pct:
  SCALP: 0.75  # скальп: высокая частота → мелкий риск на штуку
  B: 1.5       # стандартный сетап
  A: 2.0       # подтверждённый сетап
  A_PLUS: 3.0  # премиум, максимум на сделку

# Жёсткие лимиты.
limits:
  max_effective_leverage: 10     # абсолютный потолок (риск-профиль.md)
  stop_min_pct: 0.15             # тоньше = шум даже для скальпа
  liquidation_buffer_ratio: 0.3  # (stop - liq) >= 30% от расстояния стопа
  maintenance_margin_rate: 0.01  # консерв. mmr для пред-входной оценки liq (риск-профиль.md; > tier-1 BingX мажоров)

# Circuit breakers: при срабатывании RiskEngine отказывает в ордере.
# Сброс state — на стороне orchestrator (по UTC-дню/неделе/месяцу).
circuit_breakers:
  daily_loss_pct: -5.0       # -5% эквити за день → стоп до завтра
  weekly_loss_pct: -10.0     # -10% эквити за неделю → стоп до понедельника
  monthly_loss_pct: -20.0    # -20% эквити за месяц → ручной перезапуск
  max_daily_trades: 25       # после 25 сделок (любых) — стоп до завтра
  max_consecutive_losses: 5  # 5 убытков подряд = стоп до завтра

# Скальп-профиль. enabled=false — backtest-gate (план 22.4):
# SCALP-сетапы отклоняются движком, пока скальп не подтверждён бэктестом.
scalp:
  enabled: false
  fee_edge_k: 2.0          # TP% >= k × trade_cost% (правила-скальпинга.md)
  trade_cost_pct: 0.15     # round-trip fee (~0.10%) + ожидаемый slippage
  max_scalp_positions: 2   # одновременных скальп-позиций
  max_scalp_trades_day: 25 # скальп-сделок в день
