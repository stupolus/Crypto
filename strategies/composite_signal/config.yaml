# composite_signal — параметры (план 31). Дефолты детекторов
# core/signals. НЕ подгонялись под бэктест (его нет — нет истории
# OI/liq/CVD; валидация — forward-test на демо).

symbol: BTC-USDT
timeframe: 15m

# Funding-extreme: contrarian при funding в верхнем/нижнем percentile.
funding_min_history: 30        # ~10 дней 8h-funding
funding_pct_high: 0.95
funding_pct_low: 0.05

# Liquidation-sweep: каскад ликвидаций.
liq_spike_min: 3.0             # recent/baseline ≥ 3×
liq_min_baseline_usd: 50000
liq_baseline_n: 20

# CVD order-flow (3-й голос, план 35). threshold = дефолт детектора.
cvd_lookback: 12
order_flow_threshold: 0.6

# OI-gate: подтверждение направления.
oi_lookback: 12
oi_rise_pct: 2.0
oi_fall_pct: 2.0

# Exits / risk.
atr_window: 14
atr_sl_multiplier: 1.5
stop_min_pct: 0.5
tp1_r_multiple: 1.5
risk_tier: B

direction_bias: both
