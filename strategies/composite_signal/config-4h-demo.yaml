# composite_signal — 4h forward-демо (план 34).
# Тариф Coinglass даёт интервал ≥4h → демо идёт на 4h. Параметры =
# дефолт (config.yaml), кроме timeframe. НЕ подгонялись (оверфит
# запрещён). Pre-registered дизайн эксперимента — план 31.

symbol: BTC-USDT
timeframe: 4h

funding_min_history: 30
funding_pct_high: 0.95
