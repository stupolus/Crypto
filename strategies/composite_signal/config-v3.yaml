# composite v3 (план 44) = v2 + ОДНО улучшение: session-time gate.
# Pre-registered, не подгонялось. timeframe 4h (тариф Coinglass).
# Демо (config.yaml/config-4h-demo.yaml) НЕ затронут.

symbol: BTC-USDT
timeframe: 4h

funding_min_history: 30
funding_pct_high: 0.95
funding_pct_low: 0.05

liq_spike_min: 3.0
liq_min_baseline_usd: 50000
liq_baseline_n: 20

cvd_lookback: 12
order_flow_threshold: 0.6

oi_lookback: 12
oi_rise_pct: 2.0
oi_fall_pct: 2.0

atr_window: 14
atr_sl_multiplier: 1.5
stop_min_pct: 0.5
tp1_r_multiple: 1.5
risk_tier: B
direction_bias: both

# v2:
min_confidence: 0.6
tp1_r_adaptive: true
tp1_r_min: 1.0
tp1_r_max: 2.5
atr_pct_min: 0.3
atr_pct_max: 0.95
atr_pct_lookback: 200

# v3 (план 44): US/EU-overlap по UTC (13..21 = US pre+main + EU end).
# Теория: liq/funding-каскады кластеризуются в high-liq сессии;
# азиатский low-liq period — чоп, контртрендовые входы фейлят чаще.
session_hours_utc: [13, 14, 15, 16, 17, 18, 19, 20, 21]
