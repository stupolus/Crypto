# ТОЛЬКО для скальп-бэктеста (план 23). НЕ прод.
# Зеркало core/risk/config.yaml, но scalp.enabled=true — чтобы
# RiskEngine не отклонял SCALP-сетапы в бэктесте (backtest-gate, план 22.4).
# Прод-конфиг core/risk/config.yaml остаётся scalp.enabled=false.

risk_pct:
  SCALP: 0.75
  B: 1.5
  A: 2.0
  A_PLUS: 3.0

limits:
  max_effective_leverage: 10
  stop_min_pct: 0.15
  liquidation_buffer_ratio: 0.3

circuit_breakers:
  daily_loss_pct: -5.0
  weekly_loss_pct: -10.0
  monthly_loss_pct: -20.0
  max_daily_trades: 25
  max_consecutive_losses: 5

scalp:
  enabled: true
  fee_edge_k: 2.0
  trade_cost_pct: 0.15
  max_scalp_positions: 2
  max_scalp_trades_day: 25
