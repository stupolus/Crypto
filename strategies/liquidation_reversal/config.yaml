# Числа из бизнес/материалы/курсы/dmitry-shukin/, НЕ подгонять под бэктест.

symbol: BTC-USDT
# 4h — Coinglass HOBBYIST ($29) даёт liquidation history только
# 4h/6h/8h/12h/1d/1w. 15m/1h требуют STANDARD. 4h валиден для
# разворотной методологии (значимые экстремумы, swing-стиль Щукина).
timeframe: 4h

# «Значимый экстремум» — Donchian-50 (как gold: не локальный шум)
level_n: 50

# Ликвидационный sweep (порог дефолта примитива = 5x)
liq_spike_min: 5.0
liq_min_baseline_usd: 100000   # мажоры BTC/ETH: ≥ $100k (курс видео 008)
liq_baseline_n: 30

# Цикл ликвидаций: не входить в свечу sweep, ждать 2 свечи
cycle_wait_bars: 2

# OI gate
oi_lookback: 6
oi_rise_pct: 3.0
oi_fall_pct: 3.0

# CVD подтверждение
cvd_lookback: 6

# Funding-фильтр: не шортить если funding ≤ -1.5% (фаза «дойки», видео 004)
funding_short_block: -0.015

# Risk / exits (курс: 1:3 R:R; SL structural)
stop_min_pct: 0.5
tp1_r_multiple: 3.0
risk_tier: B

direction_bias: both
