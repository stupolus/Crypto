# volume_momentum — объём подтверждает импульс (план 28).
# Из дискреционного сетапа пользователя (объёмная часть).
# Числа из логики, НЕ подгон под бэктест.

symbol: BTC-USDT
timeframe: 4h          # fee-survivable, НЕ скальп (анти-скальпинг.md)

