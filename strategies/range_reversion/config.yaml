# range_reversion — торговля в боковике от поддержки к сопротивлению.
# План 25. Числа — из логики метода, НЕ подгон под бэктест.

symbol: BTC-USDT
timeframe: 4h

# Donchian-канал: «значимый» диапазон поддержки/сопротивления.
# 20 баров 4h ≈ 3.3 дня — локальный боковик.
channel_n: 20

# Фильтр тренда: торгуем только когда EMA сжаты (нет тренда).
ema_fast: 20
ema_slow: 50
range_max_spread_pct: 1.0   # боковик если |EMAf-EMAs|/EMAs < 1%

# Допуск касания границы канала (вход у края, не строго на нём).
band_buffer_pct: 0.3

# Риск/выходы (как у прочих стратегий проекта).
atr_window: 14
sl_atr_multiplier: 1.0   # SL за границей канала + 1·ATR
stop_min_pct: 0.5
tp1_r_multiple: 2.0      # цель к середине/противоположной границе
risk_tier: B
