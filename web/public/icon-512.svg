<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#0a0e14" rx="80"/>
  <!-- Background grid -->
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="url(#grid)" opacity="0.5"/>
  <!-- Diamond logo - gold -->
  <path d="M256 80 L432 256 L256 432 L80 256 Z" fill="none" stroke="#d4af37" stroke-width="14" stroke-linejoin="round"/>
  <path d="M256 120 L392 256 L256 392 L120 256 Z" fill="#d4af37" opacity="0.15"/>
  <!-- Trading candles -->
  <g stroke-width="6">
    <line x1="200" y1="180" x2="200" y2="332" stroke="#00ff88"/>
    <rect x="184" y="220" width="32" height="80" fill="#00ff88"/>
    <line x1="256" y1="160" x2="256" y2="352" stroke="#d4af37"/>
    <rect x="240" y="200" width="32" height="120" fill="#d4af37"/>
    <line x1="312" y1="200" x2="312" y2="312" stroke="#00ff88"/>
    <rect x="296" y="232" width="32" height="60" fill="#00ff88"/>
  </g>
  <!-- Symbol -->
  <text x="256" y="475" font-family="JetBrains Mono, monospace" font-weight="700" font-size="40" fill="#e6edf3" text-anchor="middle">CRYPTO</text>
</svg>
