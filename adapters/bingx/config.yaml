# BingX-адаптер: все числовые параметры со ссылками на источник.
# В коде — читаем отсюда. Не дублируем в .py.
# Источник по умолчанию: docs-v3, https://bingx-api.github.io/docs-v3/#/en/info
# Подробное обоснование — бизнес/инструменты-bingx.md, plans/01-bingx-адаптер.md.

env: live  # live | vst — переключение для будущих фаз; в фазе 0.B ходим только на live public.

# ─── Базовые URL ─────────────────────────────────────────────────────────────
# Источник: docs-v3 → Quick Start → Signature Authentication; бизнес/инструменты-bingx.md §«Базовые URL».
endpoints:
  live:
    rest_base: https://open-api.bingx.com
    ws_market: wss://open-api-swap.bingx.com/swap-market
  vst:
    rest_base: https://open-api-vst.bingx.com
    ws_market: wss://vst-open-api-ws.bingx.com/swap-market
  # Backup-домен с общим лимитом 60 req/min — режим деградации, не повседневный.
  # Источник: docs-v3 → Quick Start → Signature Authentication.
  backup_rest_base: https://open-api.bingx.io

# ─── HTTP-таймауты и retry ───────────────────────────────────────────────────
# В docs SLA на ответ не публикуется. Значения консервативные, наши.
http:
  connect_timeout_s: 5.0
  read_timeout_s: 10.0
  total_timeout_s: 15.0
  retry:
    max_attempts: 3              # 1 первичный + 2 повтора
    backoff_initial_s: 0.5
    backoff_factor: 2.0          # 0.5 → 1.0 → 2.0
    backoff_max_s: 8.0
    # 429 и 5xx — ретраим. 4xx (кроме 429) — нет, это наша ошибка.
    retryable_statuses: [429, 500, 502, 503, 504]

# ─── Rate limits ─────────────────────────────────────────────────────────────
# Источник: docs-v3 → Quick Start → Frequency Limit; changelog 2026-01-05.
# Используем 70% от официальных лимитов как safety budget (см. plans/01 §10 п.5).
rate_limits:
  # Глобальный лимит market data: 500 req / 10 s на ключ. Берём 350/10s.
  market_data:
    capacity: 350
    window_s: 10
  # Per-endpoint буферы — для будущих приватных вызовов; здесь как «контракт» с docs.
  # Числа — то, что декларируется в docs-v3 на странице соответствующего эндпоинта.
  # На фазе 0.B используется только market_data; остальные — для фазы 0.D.
  place_order_per_sec: 10        # POST /openApi/swap/v2/trade/order
  cancel_order_per_sec: 10       # DELETE /openApi/swap/v2/trade/order
  set_leverage_per_sec: 5        # POST /openApi/swap/v2/trade/leverage
  set_margin_type_per_sec: 2     # POST /openApi/swap/v2/trade/marginType
  set_position_mode_per_sec: 4   # POST /openApi/swap/v1/positionSide/dual

# ─── Подпись запроса ─────────────────────────────────────────────────────────
# Источник: docs-v3 → Quick Start → Signature Authentication.
# В фазе 0.B приватных вызовов нет, но параметры зафиксированы для фазы 0.C.
signing:
  algorithm: HMAC-SHA256
  api_key_header: X-BX-APIKEY
  recv_window_ms: 5000           # default из docs; запрос реджектится если |ts - serverTime| > recvWindow
  # Периодичность пересинка с serverTime. Наш выбор: 5 минут — компромисс между нагрузкой и точностью.
  server_time_resync_interval_s: 300

# ─── REST-эндпоинты (USDT-M perpetual) ───────────────────────────────────────
# Все пути — относительные к rest_base. Подпись не нужна для public,
# приватные требуют HMAC-SHA256 (см. signing) и X-BX-APIKEY header.
# Источник: docs-v3 → USDT-M Perp Futures → Market/Account/Trade Interfaces.
rest_endpoints:
  # Public
  server_time: /openApi/swap/v2/server/time
  contracts: /openApi/swap/v2/quote/contracts
  ticker: /openApi/swap/v2/quote/ticker
  klines: /openApi/swap/v3/quote/klines       # V3: только OHLCV+time, без n/q (квирк §11 plans/01)
  premium_index: /openApi/swap/v2/quote/premiumIndex
  funding_rate_history: /openApi/swap/v2/quote/fundingRate
  open_interest: /openApi/swap/v2/quote/openInterest
  # Private read (фаза 0.C)
  balance: /openApi/swap/v3/user/balance
  positions: /openApi/swap/v2/user/positions
  open_orders: /openApi/swap/v2/trade/openOrders
  fills: /openApi/swap/v2/trade/allFillOrders
  # Private setters — параметры аккаунта/символа (фаза 0.C, idempotent).
  # Ордерные методы (place/cancel/close) — фаза 0.D.
  set_margin_type: /openApi/swap/v2/trade/marginType
  set_leverage: /openApi/swap/v2/trade/leverage
  set_position_mode: /openApi/swap/v1/positionSide/dual
  # Ордерные методы (фаза 0.D part 1). POST + DELETE на /trade/order.
  place_order: /openApi/swap/v2/trade/order
  cancel_order: /openApi/swap/v2/trade/order
  cancel_all_orders: /openApi/swap/v2/trade/allOpenOrders
  # 0.D part 2: dead-man timer.
  cancel_all_after: /openApi/swap/v2/trade/cancelAllAfter
  # 0.D part 2: User Data Stream — listenKey CRUD (POST/PUT/DELETE один путь).
  user_data_stream: /openApi/user/auth/userDataStream

# ─── Klines ──────────────────────────────────────────────────────────────────
# Источник: docs-v3 → USDT-M Perp Futures → Get K-Line Data.
klines:
  limit_default: 500
  limit_max: 1440                # квирк: жёсткий потолок, не 1500/2000.
  # Допустимые интервалы. По docs-v3 WS должен использовать запись 1min/15min,
  # НО live BingX (проверено integration-тестом 2026-05-10) принимает только
  # REST-форму '1m' и в WS-канале (`BTC-USDT@kline_1m`). Альтернативные формы
  # отвергаются с code=80015 'dataType not support'. Записать как квирк
  # в plans/01 §7. Список интервалов один и тот же для REST и WS.
  intervals_rest: [1m, 3m, 5m, 15m, 30m, 1h, 2h, 4h, 6h, 8h, 12h, 1d, 3d, 1w, 1M]
  intervals_ws: [1m, 3m, 5m, 15m, 30m, 1h, 2h, 4h, 6h, 8h, 12h, 1d, 3d, 1w, 1M]

# ─── WebSocket ───────────────────────────────────────────────────────────────
# Источник: docs-v3 → USDT-M Perp Futures → WebSocket секции
# (Connection Limitations / Data Compression / Heartbeats / Subscriptions).
websocket:
  # Сжатие — все ответы сервера gzip, клиент обязан декомпрессить.
  compression: gzip
  # Heartbeat: сервер шлёт текстовое "Ping" каждые 5 с; клиент должен ответить текстовым "Pong"
  # в течение 10 с, иначе разрыв. Это литералы, не JSON.
  ping_text: Ping
  pong_text: Pong
  ping_expected_interval_s: 5
  pong_deadline_s: 10
  # Если за watchdog_silence_s от сервера нет ни Ping, ни data — реконнект.
  watchdog_silence_s: 30
  # Реконнект с экспоненциальным backoff.
  reconnect:
    initial_delay_s: 1.0
    factor: 2.0
    max_delay_s: 60.0
  # Лимиты: до 200 топиков на 1 ws, до 60 ws на 1 IP (EN-доку; ZH расходится — берём консервативно).
  max_topics_per_connection: 200
  max_connections_per_ip: 60
  # Таймаут на ack `{"id":..,"code":0,"msg":"SUCCESS"}` после sub/unsub.
  subscribe_ack_timeout_s: 10

# ─── Дефолтные параметры для smoke-проверки фазы 0.B ────────────────────────
# Реальные значения precision/min для каждого символа подтягиваются из /quote/contracts.
# Эти — справочные, для интеграционных тестов.
defaults:
  primary_symbol: BTC-USDT       # фаза 1 по plans/00
  primary_interval_rest: 15m
  primary_interval_ws: 1m        # live BingX принимает REST-форму и в WS
  smoke_klines_limit: 10

# ─── Compensating-close (0.D part 2) ─────────────────────────────────────────
# После place_order(entry+SL) BingX публикует attached SL в openOrders с
# небольшой задержкой. Адаптер проверяет наличие SL — если за указанные попытки
# его не находит, закрывает позицию рыночным reduce_only.
place_order:
  compensating_check_delay_ms: 500
  compensating_check_attempts: 3
  compensating_check_backoff_factor: 2.0

# ─── User Data Stream (0.D part 2) ───────────────────────────────────────────
# TTL listenKey = 1 час (квирк §7 п.16). Buffer 30 мин: продлеваем за 30 мин до
# истечения. Если PUT возвращает ошибку — пересоздаём listenKey + reconnect WS.
user_data_stream:
  keep_alive_interval_s: 1800            # 30 мин
  reconnect_initial_delay_s: 1.0
  reconnect_max_delay_s: 60.0
  reconnect_factor: 2.0
  watchdog_silence_s: 60                  # user-stream может молчать долго
  # Periodic soft-reconcile: каждые N сек эмитим RECONCILE-event с
  # REST-снимком, даже если WS не разрывался. Защита от «потеря push
  # в полёте» (BingX баг / network glitch без disconnect).
  soft_reconcile_interval_s: 120         # 2 мин — защита от «потерянных push в полёте» на D3 demo и live.

# ─── cancelAllAfter (0.D part 2) ─────────────────────────────────────────────
# Биржевой dead-man (квирк §7 п.24). Если адаптер не сбросит таймер за окно,
# биржа отменит все открытые ордера.
cancel_all_after:
  default_window_ms: 60000               # 60 сек
  refresh_interval_s: 20                 # 1/3 от окна

# ─── Защитные инварианты ─────────────────────────────────────────────────────
# Жёсткий запрет «нет стопа на бирже — нет позиции» из бизнес/риск-профиль.md.
# В фазе 0.B мы НЕ торгуем — параметр зафиксирован для фазы 0.D как декларация.
invariants:
  position_mode: one_way         # см. бизнес/риск-профиль.md и plans/01 §3
  margin_type: ISOLATED          # CROSSED запрещён бизнес/риск-профиль.md
  attached_stop_required: true   # entry без attached SL не размещается (фаза 0.D)
