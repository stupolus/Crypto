# Paper-runner gold-bot. Запускать из каталога gold-bot:
#   docker compose -f deploy/docker-compose.yaml up -d
#
# Перед первым запуском:
#   sudo mkdir -p /var/lib/gold-bot && sudo chown 1000:1000 /var/lib/gold-bot
#   cp deploy/.env.example deploy/.env   # (опционально, для Telegram)
#
# Никаких live-ключей в окружении быть не должно. Image вообще не вызывает
# приватные методы биржи — даже если переменные присутствуют, эффекта нет
# (plan 06 §«Ключевые инварианты», CLAUDE.md §6).

services:
  gold-bot-paper:
    container_name: gold-bot-paper
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: gold-bot-paper:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /var/lib/gold-bot:/var/lib/gold-bot
    # Логи → stdout (JSON). Docker сам ротирует, лимит 50MB × 5 файлов.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    # Никаких published-портов — runner ничего не слушает наружу.
    # Healthcheck по heartbeat в SQLite (проверяет что записан < 600 сек назад).
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - |
          import sqlite3, time, sys
          c = sqlite3.connect("/var/lib/gold-bot/paper.sqlite")
          row = c.execute("SELECT value FROM runner_state WHERE key='heartbeat_ts'").fetchone()
          sys.exit(0 if row and (time.time()*1000 - int(row[0])) < 600_000 else 1)
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 300s
